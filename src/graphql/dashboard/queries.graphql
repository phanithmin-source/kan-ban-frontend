query DashboardData(
  $recentTasksFilter: TaskFilterInput!
  $doneFilter: TaskFilterInput!
  $progressFilter: TaskFilterInput!
  $includeUsers: Boolean!
) {
  boards {
    id
    name
    isArchived
    createdAt
    updatedAt
    owner {
      id
      name
      email
    }
  }
  recentTasks: tasks(filter: $recentTasksFilter) {
    data {
      id
      title
      status
      priority
      board {
        id
        name
      }
      assignee {
        id
        name
      }
    }
    total
  }
  doneTasks: tasks(filter: $doneFilter) {
    total
  }
  progressTasks: tasks(filter: $progressFilter) {
    total
  }
  users @include(if: $includeUsers) {
    id
    name
    email
    role
  }
}
query Boards {
  boards {
    id
    name
    isArchived
    createdAt
    updatedAt
    owner {
      id
      name
      email
    }
  }
}

query Board($id: ID!) {
  board(id: $id) {
    id
    name
    isArchived
    createdAt
    updatedAt
    owner {
      id
      name
      email
    }
    members {
      id
      role
      user {
        id
        name
        email
      }
    }
  }
}

mutation CreateBoard($input: CreateBoardInput!) {
  createBoard(input: $input) {
    id
    name
    createdAt
    updatedAt
  }
}

mutation UpdateBoard($id: ID!, $input: UpdateBoardInput!) {
  updateBoard(id: $id, input: $input) {
    id
    name
    updatedAt
  }
}

mutation DeleteBoard($id: ID!) {
  deleteBoard(id: $id)
}

mutation ArchiveBoard($id: ID!) {
  archiveBoard(id: $id) {
    id
    isArchived
  }
}

mutation RestoreBoard($id: ID!) {
  restoreBoard(id: $id) {
    id
    isArchived
  }
}

mutation AddBoardMember($boardId: ID!, $userId: ID!, $role: BoardRole!) {
  addBoardMember(boardId: $boardId, userId: $userId, role: $role) {
    id
    role
    user {
      id
      name
      email
    }
  }
}

mutation RemoveBoardMember($boardId: ID!, $userId: ID!) {
  removeBoardMember(boardId: $boardId, userId: $userId)
}

mutation UpdateBoardMemberRole($boardId: ID!, $userId: ID!, $role: BoardRole!) {
  updateBoardMemberRole(boardId: $boardId, userId: $userId, role: $role) {
    id
    role
  }
}
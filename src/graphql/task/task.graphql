query Tasks(
  $page: Int
  $limit: Int
  $search: String
  $status: TaskStatus
  $priority: TaskPriority
  $sortBy: TaskSortField
  $order: SortOrder
  $boardId: ID
  $assigneeId: ID
) {
  tasks(
    filter: {
      page: $page
      limit: $limit
      search: $search
      status: $status
      priority: $priority
      sortBy: $sortBy
      order: $order
      boardId: $boardId
      assigneeId: $assigneeId
    }
  ) {
    data {
      id
      title
      description
      status
      priority
      dueDate
      isArchived
      createdAt
      updatedAt

      board {
        id
        name
      }

      assignee {
        id
        name
        email
      }
      creator {
        id
        name
      }
    }

    total
    page
    limit
    totalPages
  }
}


query Task($id: ID!) {
  task(id: $id) {
    id
    title
    description
    status
    priority
    dueDate
    isArchived
    createdAt
    updatedAt

    board {
      id
      name
    }

    assignee {
      id
      name
      email
    }
    creator {
      id
      name
      email
    }
    comments {
      id
      content
      createdAt
      user {
        id
        name
        email
      }
    }
  }
}

mutation CreateTask($input: CreateTaskInput!) {
  createTask(input: $input) {
    id
    title
    status
    priority
    dueDate
    isArchived
    createdAt

    board {
      id
      name
    }

    assignee {
      id
      name
    }
    creator {
      id
      name
    }
  }
}

mutation UpdateTask($id: ID!, $input: UpdateTaskInput!) {
  updateTask(id: $id, input: $input) {
    id
    title
    description
    status
    priority
    dueDate
    isArchived
    updatedAt
  }
}

mutation DeleteTask($id: ID!) {
  deleteTask(id: $id)
}

mutation UpdateTaskStatus($id: ID!, $status: TaskStatus!) {
  updateTaskStatus(id: $id, status: $status) {
    id
    status
    updatedAt
  }
}

mutation AssignTask($taskId: ID!, $userId: ID!) {
  assignTask(taskId: $taskId, userId: $userId) {
    id
    assignee {
      id
      name
      email
    }
  }
}

mutation ArchiveTask($id: ID!) {
  archiveTask(id: $id) {
    id
    isArchived
  }
}

mutation RestoreTask($id: ID!) {
  restoreTask(id: $id) {
    id
    isArchived
  }
}

mutation AddComment($taskId: ID!, $content: String!) {
  addComment(taskId: $taskId, content: $content) {
    id
    content
    createdAt
    user {
      id
      name
      email
    }
  }
}

mutation UpdateComment($id: ID!, $content: String!) {
  updateComment(id: $id, content: $content) {
    id
    content
    createdAt
  }
}

mutation DeleteComment($id: ID!) {
  deleteComment(id: $id)
}